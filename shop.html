<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Newstalgia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shop.css">
</head>

<body class="shop_background">
    <div>
        <div class="shop_front" style="margin: 0;">
            <div class="header">
                <div class="shop_back"><a href="index.html">Back</a></div>
                <div class="shop_btn"><a href="index.html">SHOP</a></div>
                <div class="icon_cart">
                    <svg  aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="currentColor" viewBox="0 0 24 24">
                        <path fill-rule="evenodd" d="M14 7h-4v3a1 1 0 0 1-2 0V7H6a1 1 0 0 0-.997.923l-.917 11.924A2 2 0 0 0 6.08 22h11.84a2 2 0 0 0 1.994-2.153l-.917-11.924A1 1 0 0 0 18 7h-2v3a1 1 0 1 1-2 0V7Zm-2-3a2 2 0 0 0-2 2v1H8V6a4 4 0 0 1 8 0v1h-2V6a2 2 0 0 0-2-2Z" clip-rule="evenodd"/>
                      </svg>
                      
                      <span>0</span>
                      
                </div>
            </div>
            <div class="shoptext" style="font-weight: 600; font-size: x-large;">
                <p>We sell every product we made in limited quantity <br>Come to get!!!</p>
            </div>
            <div class="listProduct">
                <div class="item">
                    <h2 class="product-name">PitiocaFont</h2>
                    <img src="./assets/image/NEWSTALGIA WEB-18.png" alt="">
                    <div class="product-buy">
                        <div class="price">15$</div>
                        <button class="addCart">
                            Add to ShoppingBag
                    </button>
                </div>
                    </div>                  
                   
                </div>
            </div>
            <div class="cartTab">
                <h1>Shopping Bag</h1> 
                <div class="listCart">
                    <div class="item">
                        <div class="image">
                            <img src="./assets/image/NEWSTALGIA WEB-19.png" alt="">
                        </div>
                        <div class="name">
                            Name
                        </div>
                        <div class="totalPrice">
                            25$
                        </div>
                        <div class="quantity">
                            <span class="minus"><</span>
                            <span>1</span>
                            <span class="plus">></span>
                        </div>
                    </div>
    
                </div>
                <div class="btn">
                    <button class="close">CLOSE</button>
                    <button class="checkOut">CHECK OUT</button>
                </div>
            </div>
            <footer class="footer">
                <div class="footer_btn footer_home"><a href="index.html">Home</a></div>
                <div class="footer_btn footer_next"><a href="nextpage.html">Next</a></div>
            </footer>
            
    </div>
    
    
    
    <script src="js/script.js"></script>
    <script src="js/common.js"></script>    
</body>
</html>
